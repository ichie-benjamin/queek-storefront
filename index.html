<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />

    <!-- Default title & description (overridden by React once vendor loads) -->
    <title>Queek Store — Order Food, Groceries &amp; More</title>
    <meta name="description" content="Order food, groceries and more from your favourite local store. Fast delivery, trusted vendors, secure payments — powered by Queek." />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Queek" />

    <!-- Open Graph defaults -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Queek Store" />
    <meta property="og:title"       content="Queek Store — Order Food, Groceries &amp; More" />
    <meta property="og:description" content="Order food, groceries and more from your favourite local store. Fast delivery, trusted vendors, secure payments — powered by Queek." />
    <meta property="og:image"       content="/logo/queek.png" />
    <meta property="og:locale"      content="en_NG" />

    <!-- Twitter / X defaults -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@queekapp" />
    <meta name="twitter:title"       content="Queek Store — Order Food, Groceries &amp; More" />
    <meta name="twitter:description" content="Order food, groceries and more from your favourite local store. Fast delivery, trusted vendors, secure payments." />
    <meta name="twitter:image"       content="/logo/queek.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
